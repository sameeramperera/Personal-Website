<svg width="800" height="385" viewBox="0 0 800 385" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">

  <text x="40" y="34" font-size="15" font-weight="600" fill="#2C2C2A">The access byte</text>

  <!-- 8 bit boxes, bit 7 down to bit 0, x=40 start, width 88 each, gap 6 -->
  <g font-size="12">
    <rect x="40" y="60" width="88" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
    <text x="84" y="81" text-anchor="middle" fill="#993C1D">bit 7</text>
    <text x="84" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#4A1B0C">1</text>

    <rect x="134" y="60" width="88" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="178" y="81" text-anchor="middle" fill="#0F6E56">bit 6</text>
    <text x="178" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#04342C">0</text>

    <rect x="228" y="60" width="88" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="272" y="81" text-anchor="middle" fill="#0F6E56">bit 5</text>
    <text x="272" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#04342C">0</text>

    <rect x="322" y="60" width="88" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <text x="366" y="81" text-anchor="middle" fill="#3C3489">bit 4</text>
    <text x="366" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#26215C">1</text>

    <rect x="416" y="60" width="88" height="60" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
    <text x="460" y="81" text-anchor="middle" fill="#854F0B">bit 3</text>
    <text x="460" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#412402">1</text>

    <rect x="510" y="60" width="88" height="60" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
    <text x="554" y="81" text-anchor="middle" fill="#5F5E5A">bit 2</text>
    <text x="554" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#2C2C2A">0</text>

    <rect x="604" y="60" width="88" height="60" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
    <text x="648" y="81" text-anchor="middle" fill="#854F0B">bit 1</text>
    <text x="648" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#412402">1</text>

    <rect x="698" y="60" width="88" height="60" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
    <text x="742" y="81" text-anchor="middle" fill="#5F5E5A">bit 0</text>
    <text x="742" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#2C2C2A">0</text>
  </g>

  <text x="40" y="148" font-size="14" font-weight="600" fill="#2C2C2A">Binary 1 0 0 1 1 0 1 0  →  decimal 154  →  hex 0x9A</text>

  <line x1="40" y1="167" x2="760" y2="167" stroke="#D3D1C7" stroke-width="1"/>

  <g font-size="13" fill="#2C2C2A">
    <text x="40" y="197"><tspan font-weight="600">Bit 7 – Present:</tspan> must be 1 for a valid, usable segment</text>
    <text x="40" y="221"><tspan font-weight="600">Bits 6-5 – Privilege level (DPL):</tspan> 00 = ring 0, kernel level</text>
    <text x="40" y="245"><tspan font-weight="600">Bit 4 – Descriptor type (S):</tspan> 1 for a normal code or data segment</text>
    <text x="40" y="269"><tspan font-weight="600">Bit 3 – Executable (E):</tspan> 1 = code segment, 0 = data segment</text>

    <text x="420" y="197"><tspan font-weight="600">Bit 2 – Direction/conforming (DC):</tspan> left as 0</text>
    <text x="420" y="221"><tspan font-weight="600">Bit 1 – Readable/writable (RW):</tspan> readable for code, writable for data</text>
    <text x="420" y="245"><tspan font-weight="600">Bit 0 – Accessed (A):</tspan> set automatically by the CPU</text>
  </g>

  <line x1="40" y1="290" x2="760" y2="290" stroke="#D3D1C7" stroke-width="1"/>

  <text x="40" y="320" font-size="13" fill="#2C2C2A">Code descriptor — present, ring 0, executable, readable  →  1001 1010  →  0x9A</text>
  <text x="40" y="345" font-size="13" fill="#2C2C2A">Data descriptor — only bit 3 flips to 0, bit 1 now means writable  →  1001 0010  →  0x92</text>
</svg>
