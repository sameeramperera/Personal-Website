<svg width="820" height="260" viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">

  <!-- top row: bit ranges, same as original -->
  <rect x="40" y="55" width="176" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="128" y="76" font-size="12" text-anchor="middle" fill="#3C3489">bits 0-15</text>
  <text x="128" y="98" font-size="13" font-weight="600" text-anchor="middle" fill="#26215C">limit low (16)</text>

  <rect x="220" y="55" width="176" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="308" y="76" font-size="12" text-anchor="middle" fill="#0F6E56">bits 16-31</text>
  <text x="308" y="98" font-size="13" font-weight="600" text-anchor="middle" fill="#04342C">base low (16)</text>

  <rect x="400" y="55" width="88" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="444" y="76" font-size="12" text-anchor="middle" fill="#0F6E56">bits 32-39</text>
  <text x="444" y="98" font-size="13" font-weight="600" text-anchor="middle" fill="#04342C">base mid (8)</text>

  <rect x="492" y="55" width="88" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="536" y="76" font-size="12" text-anchor="middle" fill="#993C1D">bits 40-47</text>
  <text x="536" y="98" font-size="13" font-weight="600" text-anchor="middle" fill="#4A1B0C">access (8)</text>

  <rect x="584" y="55" width="44" height="60" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="606" y="76" font-size="11" text-anchor="middle" fill="#3C3489">48-51</text>
  <text x="606" y="98" font-size="11" font-weight="600" text-anchor="middle" fill="#26215C">lim hi</text>

  <rect x="632" y="55" width="44" height="60" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="654" y="76" font-size="11" text-anchor="middle" fill="#854F0B">52-55</text>
  <text x="654" y="98" font-size="11" font-weight="600" text-anchor="middle" fill="#412402">flags</text>

  <rect x="680" y="55" width="88" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="724" y="76" font-size="12" text-anchor="middle" fill="#0F6E56">bits 56-63</text>
  <text x="724" y="98" font-size="13" font-weight="600" text-anchor="middle" fill="#04342C">base hi (8)</text>

  <!-- byte number tags below each box -->
  <text x="128" y="135" font-size="11" text-anchor="middle" fill="#8A8880">byte 0-1</text>
  <text x="308" y="135" font-size="11" text-anchor="middle" fill="#8A8880">byte 2-3</text>
  <text x="444" y="135" font-size="11" text-anchor="middle" fill="#8A8880">byte 4</text>
  <text x="536" y="135" font-size="11" text-anchor="middle" fill="#8A8880">byte 5</text>
  <text x="630" y="142" font-size="11" text-anchor="middle" fill="#8A8880">byte 6</text>
  <text x="724" y="135" font-size="11" text-anchor="middle" fill="#8A8880">byte 7</text>

  <!-- bracket under the two boxes that make up byte 6 -->
  <path d="M 584 118 L 584 124 L 676 124 L 676 118" fill="none" stroke="#8A8880" stroke-width="1"/>

  <!-- bottom summary row -->
  <rect x="40" y="180" width="220" height="70" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="150" y="205" font-size="15" font-weight="700" text-anchor="middle" fill="#26215C">Limit</text>
  <text x="150" y="227" font-size="12" text-anchor="middle" fill="#3C3489">16 + 4 = 20 bits</text>

  <rect x="280" y="180" width="220" height="70" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="390" y="205" font-size="15" font-weight="700" text-anchor="middle" fill="#04342C">Base</text>
  <text x="390" y="227" font-size="12" text-anchor="middle" fill="#0F6E56">16 + 8 + 8 = 32 bits</text>

  <rect x="520" y="180" width="110" height="70" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="575" y="205" font-size="15" font-weight="700" text-anchor="middle" fill="#4A1B0C">Access</text>
  <text x="575" y="227" font-size="12" text-anchor="middle" fill="#993C1D">8 bits</text>

  <rect x="648" y="180" width="120" height="70" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="708" y="205" font-size="15" font-weight="700" text-anchor="middle" fill="#412402">Flags</text>
  <text x="708" y="227" font-size="12" text-anchor="middle" fill="#854F0B">4 bits</text>
</svg>
