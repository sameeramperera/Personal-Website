<svg width="820" height="420" viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ORIGINAL ROW, unchanged -->
  <rect x="40" y="40" width="176" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="128" y="60" font-size="11" text-anchor="middle" fill="#3C3489">bits 0-15</text>
  <text x="128" y="80" font-size="12" font-weight="600" text-anchor="middle" fill="#26215C">limit low (16)</text>

  <rect x="220" y="40" width="176" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="308" y="60" font-size="11" text-anchor="middle" fill="#0F6E56">bits 16-31</text>
  <text x="308" y="80" font-size="12" font-weight="600" text-anchor="middle" fill="#04342C">base low (16)</text>

  <rect x="400" y="40" width="88" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="444" y="60" font-size="11" text-anchor="middle" fill="#0F6E56">bits 32-39</text>
  <text x="444" y="80" font-size="12" font-weight="600" text-anchor="middle" fill="#04342C">base mid (8)</text>

  <rect x="492" y="40" width="88" height="56" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="536" y="60" font-size="11" text-anchor="middle" fill="#993C1D">bits 40-47</text>
  <text x="536" y="80" font-size="12" font-weight="600" text-anchor="middle" fill="#4A1B0C">access (8)</text>

  <rect x="584" y="40" width="44" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="606" y="60" font-size="10" text-anchor="middle" fill="#3C3489">48-51</text>
  <text x="606" y="80" font-size="10" font-weight="600" text-anchor="middle" fill="#26215C">lim hi</text>

  <rect x="632" y="40" width="44" height="56" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="654" y="60" font-size="10" text-anchor="middle" fill="#854F0B">52-55</text>
  <text x="654" y="80" font-size="10" font-weight="600" text-anchor="middle" fill="#412402">flags</text>

  <rect x="680" y="40" width="80" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="720" y="60" font-size="11" text-anchor="middle" fill="#0F6E56">bits 56-63</text>
  <text x="720" y="80" font-size="12" font-weight="600" text-anchor="middle" fill="#04342C">base hi (8)</text>

  <!-- DOTTED BOX grouping 48-51 and 52-55 together -->
  <rect x="580" y="34" width="100" height="68" rx="8" fill="none" stroke="#2C2C2A" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ARROW pointing down from dotted box -->
  <line x1="630" y1="132" x2="630" y2="170" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="40" y1="185" x2="780" y2="185" stroke="#D3D1C7" stroke-width="1"/>

  <!-- LEVEL 1 -->
  <text x="40" y="212" font-size="13" fill="#5F5E5A">Level 1 — byte 6 splits into two 4-bit fields</text>

  <rect x="540" y="222" width="176" height="52" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="628" y="243" font-size="12" font-weight="600" text-anchor="middle" fill="#26215C">Limit — lower 4 bits</text>
  <text x="628" y="261" font-size="11" text-anchor="middle" fill="#3C3489">was the "48-51" box</text>

  <rect x="360" y="222" width="176" height="52" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="448" y="243" font-size="12" font-weight="600" text-anchor="middle" fill="#412402">Flags — upper 4 bits</text>
  <text x="448" y="261" font-size="11" text-anchor="middle" fill="#854F0B">was the "52-55" box</text>

  <line x1="40" y1="294" x2="780" y2="294" stroke="#D3D1C7" stroke-width="1"/>

  <!-- LEVEL 2 -->
  <text x="40" y="320" font-size="13" fill="#5F5E5A">Level 2 — zooming into just the flags nibble, its own 4 bits</text>

  <line x1="448" y1="274" x2="448" y2="330" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <rect x="176" y="338" width="88" height="56" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="220" y="358" font-size="11" text-anchor="middle" fill="#854F0B">bit 7</text>
  <text x="220" y="378" font-size="11" font-weight="600" text-anchor="middle" fill="#412402">Granularity</text>

  <rect x="270" y="338" width="88" height="56" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="314" y="358" font-size="11" text-anchor="middle" fill="#854F0B">bit 6</text>
  <text x="314" y="378" font-size="11" font-weight="600" text-anchor="middle" fill="#412402">Size (32-bit)</text>

  <rect x="364" y="338" width="88" height="56" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="408" y="358" font-size="11" text-anchor="middle" fill="#5F5E5A">bit 5</text>
  <text x="408" y="378" font-size="11" text-anchor="middle" fill="#2C2C2A">reserved, 0</text>

  <rect x="458" y="338" width="88" height="56" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="502" y="358" font-size="11" text-anchor="middle" fill="#5F5E5A">bit 4</text>
  <text x="502" y="378" font-size="11" text-anchor="middle" fill="#2C2C2A">available, 0</text>

</svg>
