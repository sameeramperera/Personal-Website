<svg width="820" height="190" viewBox="0 0 820 190" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">

  <rect x="40" y="30" width="230" height="130" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="155" y="60" font-size="14" font-weight="600" text-anchor="middle" fill="#2C2C2A">Null descriptor</text>
  <text x="155" y="86" font-size="12" text-anchor="middle" fill="#5F5E5A">required to be all zeros</text>
  <text x="155" y="108" font-size="12" text-anchor="middle" fill="#5F5E5A">never actually used to</text>
  <text x="155" y="130" font-size="12" text-anchor="middle" fill="#5F5E5A">address memory</text>

  <rect x="295" y="30" width="230" height="130" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="410" y="60" font-size="14" font-weight="600" text-anchor="middle" fill="#04342C">Code descriptor</text>
  <text x="410" y="86" font-size="12" text-anchor="middle" fill="#0F6E56">describes a region of</text>
  <text x="410" y="108" font-size="12" text-anchor="middle" fill="#0F6E56">memory allowed to hold</text>
  <text x="410" y="130" font-size="12" text-anchor="middle" fill="#0F6E56">executable instructions</text>

  <rect x="550" y="30" width="230" height="130" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="665" y="60" font-size="14" font-weight="600" text-anchor="middle" fill="#412402">Data descriptor</text>
  <text x="665" y="86" font-size="12" text-anchor="middle" fill="#854F0B">describes a region of</text>
  <text x="665" y="108" font-size="12" text-anchor="middle" fill="#854F0B">memory allowed to hold</text>
  <text x="665" y="130" font-size="12" text-anchor="middle" fill="#854F0B">readable, writable data</text>
</svg>
